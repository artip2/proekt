<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Score System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="background">
    <div class="circle one"></div>
    <div class="circle two"></div>
  </div>

  <div class="container">

    <div class="top-bar">
      <h1>📚 Student Score System</h1>

      <button id="themeToggle" class="theme-btn">
        🌙
      </button>
    </div>

    <div class="tabs">
      <button class="tab active" id="teacherBtn">
        👨‍🏫 Учитель
      </button>

      <button class="tab" id="studentBtn">
        🎓 Ученик
      </button>
    </div>

    <!-- ================= -->
    <!-- Teacher Section -->
    <!-- ================= -->

    <section id="teacherSection" class="panel active-panel">

      <div class="card">

        <label>Предмет</label>

        <select id="subject">
          <option value="">Выберите предмет</option>
          <option>Математика</option>
          <option>Информатика</option>
          <option>Русский язык</option>
          <option>Физика</option>
          <option>История</option>
          <option>Биология</option>
        </select>

        <label>Имя студента</label>
        <input type="text" id="teacherStudentName" placeholder="Введите имя">

        <label>Оценка</label>

        <div class="score-row">

          <select id="score">
            <option value="">Баллы</option>
            <option value="Н">Н</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>

          <input type="text" id="comment" placeholder="Комментарий">
        </div>

        <button class="main-btn" id="addBtn">
          ➕ Добавить оценку
        </button>

      </div>

      <div class="card">

        <div class="manage-top">
          <h3>Управление оценками</h3>

          <button class="secondary-btn" id="showManageBtn">
            Показать
          </button>
        </div>

        <div id="manageArea"></div>

      </div>

    </section>

    <!-- ================= -->
    <!-- Student Section -->
    <!-- ================= -->

    <section id="studentSection" class="panel">

      <div class="card">

        <label>Введите своё имя</label>

        <input type="text" id="studentName" placeholder="Имя студента">

        <button class="main-btn" id="viewBtn">
          📊 Показать оценки
        </button>

      </div>

      <div class="stats-grid">

        <div class="stat-card">
          <span>Средний балл</span>
          <h2 id="avgStat">0.00</h2>
        </div>

        <div class="stat-card">
          <span>Всего оценок</span>
          <h2 id="countStat">0</h2>
        </div>

        <div class="stat-card">
          <span>Пропуски</span>
          <h2 id="skipStat">0</h2>
        </div>

      </div>

      <div id="studentResults"></div>

    </section>

  </div>

  <div id="toast"></div>

  <script src="script.js"></script>

</body>
</html>
